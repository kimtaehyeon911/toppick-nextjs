name: ingest-and-resolve
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}
jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: toppick-next
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm install @supabase/supabase-js --no-save
      - name: Ingest fixtures
        run: node worker/index.mjs ingest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SPORTS_API_KEY: ${{ secrets.SPORTSDB_KEY }}
      - name: Resolve finished games
        run: node worker/index.mjs resolve
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SPORTS_API_KEY: ${{ secrets.SPORTSDB_KEY }}